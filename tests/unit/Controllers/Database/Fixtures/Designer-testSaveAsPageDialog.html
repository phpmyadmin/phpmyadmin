<form action="index.php?route=/database/designer&lang=en" method="post" name="save_as_pages" id="save_as_pages" class="ajax">

  <table class="table table-borderless">
    <tbody>
      <tr>
        <td>
          <input type="hidden" name="operation" value="savePage">
          <select name="selected_page" id="selected_page">
    <option value="0">-- Select page --</option>
                        <option value="1">
                Page one
            </option>
                    <option value="2">

            </option>
            </select>
        </td>
      </tr>
      <tr>
        <td>
          <div>

          <div>
            <input type="radio" name="save_page" id="savePageNewRadio" value="new">

      <tr>
        <td>

    </tbody>
  </table>
